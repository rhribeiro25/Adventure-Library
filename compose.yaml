services:

  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # PostgreSQL
      DATABASE_HOST: pgsql
      DATABASE_PORT: 5432
      DATABASE_NAME: adventure-library
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      # Redis
#      REDIS_HOST: redis
#      REDIS_PORT: 6379
    depends_on:
      pgsql:
        condition: service_healthy
    volumes:
      - ./.data/app:/var/lib/app
    networks:
      - app-net

  pgsql:
    container_name: pgsql
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: adventure-library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./.data/pgsql:/var/lib/postgresql/data
    networks:
      - app-net

#  redis:
#    container_name: redis
#    image: redis:7
#    restart: unless-stopped
#    ports:
#      - "6379:6379"
#    volumes:
#      - ./.data/redis:/data
#    networks:
#      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  .data:
